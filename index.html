<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Generator & Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #f5f0e8;
      background-image: repeating-linear-gradient(
        transparent, transparent 27px, #e8e0ce 27px, #e8e0ce 28px
      );
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 20px;
      color: #2c2416;
    }

    .container {
      background: #fffdf7;
      border: 2px solid #d4c9b0;
      border-radius: 3px;
      padding: 40px 36px;
      width: 100%;
      max-width: 540px;
      box-shadow: 6px 6px 0px #c9bfa8;
      position: relative;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 52px;
      width: 2px;
      height: 100%;
      background: #f0b8b8;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 1.9rem;
      color: #2c2416;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    h1 span {
      color: #b85c2c;
      font-style: italic;
    }

    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: #7a6e5f;
      margin-bottom: 30px;
      font-family: 'Courier New', monospace;
    }

    h2 {
      font-family: Georgia, serif;
      font-size: 1.1rem;
      color: #2c2416;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 2px dashed #d4c9b0;
    }

    section { margin-bottom: 32px; }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-family: Arial, sans-serif;
      color: #2c2416;
      cursor: pointer;
      background: #f5f0e8;
      border: 1.5px solid #d4c9b0;
      padding: 5px 12px;
      border-radius: 2px;
      transition: all 0.15s;
      font-weight: 600;
    }

    .options label:hover {
      border-color: #b85c2c;
      color: #b85c2c;
    }

    input[type="checkbox"] {
      accent-color: #b85c2c;
      width: 14px;
      height: 14px;
    }

    .length-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: Arial, sans-serif;
    }

    input[type="number"] {
      width: 70px;
      padding: 6px 10px;
      border: 2px solid #d4c9b0;
      border-radius: 2px;
      background: #f5f0e8;
      color: #2c2416;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="number"]:focus { border-color: #b85c2c; }

    button {
      font-family: Arial, sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      border: 2px solid #2c2416;
      border-radius: 2px;
      padding: 9px 18px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #generateBtn {
      background: #b85c2c;
      color: #fff;
      border-color: #b85c2c;
      box-shadow: 4px 4px 0px #d4c9b0;
      width: 100%;
      margin-bottom: 14px;
      font-size: 0.95rem;
    }

    #generateBtn:hover {
      background: #9a4a22;
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0px #c0b49a;
    }

    #generateBtn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #c0b49a;
    }

    .result {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .result input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid #d4c9b0;
      border-radius: 2px;
      background: #f5f0e8;
      color: #2c2416;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      outline: none;
    }

    #copyBtn {
      background: #fffdf7;
      color: #2c2416;
      border-color: #d4c9b0;
      box-shadow: 4px 4px 0px #d4c9b0;
    }

    #copyBtn:hover {
      background: #f5f0e8;
      transform: translate(-1px, -1px);
    }

    #saveBtn {
      background: #3a7d44;
      color: #fff;
      border-color: #3a7d44;
      box-shadow: 4px 4px 0px #d4c9b0;
      width: 100%;
    }

    #saveBtn:hover {
      background: #2e6337;
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0px #c0b49a;
    }

    #exportBtn {
      background: #fffdf7;
      color: #2c2416;
      border: 2px solid #d4c9b0;
      box-shadow: 4px 4px 0px #d4c9b0;
      width: 100%;
      margin-bottom: 10px;
    }

    #exportBtn:hover {
      background: #f5f0e8;
      transform: translate(-1px, -1px);
    }

    #importBtn {
      background: #2c5f8a;
      color: #fff;
      border-color: #2c5f8a;
      box-shadow: 4px 4px 0px #d4c9b0;
      width: 100%;
      margin-bottom: 18px;
    }

    #importBtn:hover {
      background: #214a6e;
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0px #c0b49a;
    }

    #passwordList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #passwordList li {
      background: #f5f0e8;
      border: 1.5px solid #d4c9b0;
      border-radius: 2px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #2c2416;
      gap: 8px;
    }

    #passwordList li span { flex: 1; word-break: break-all; }

    #passwordList li button {
      padding: 5px 10px;
      font-size: 0.78rem;
    }

    .reveal-btn {
      background: #fffdf7 !important;
      color: #2c2416 !important;
      border: 1.5px solid #d4c9b0 !important;
      box-shadow: 2px 2px 0px #d4c9b0;
      margin-right: 6px;
    }

    .delete-btn {
      background: #c0392b !important;
      color: #fff !important;
      border-color: #c0392b !important;
      box-shadow: 2px 2px 0px #a93226;
    }

    .delete-btn:hover { background: #a93226 !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Password <span>Generator</span> & Manager</h1>
    <p class="subtitle">// stored locally. encrypted. yours only.</p>

    <section id="generator">
      <h2>Generate Password</h2>
      <div class="options">
        <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
        <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
        <label><input type="checkbox" id="numbers" checked> Numbers</label>
        <label><input type="checkbox" id="symbols"> Symbols</label>
      </div>
      <div class="length-row">
        <span>Length</span>
        <input type="number" id="length" value="12" min="6" max="64"/>
      </div>
      <button id="generateBtn">Generate</button>
      <div class="result">
        <input type="text" id="generatedPassword" readonly />
        <button id="copyBtn">Copy</button>
      </div>
      <button id="saveBtn">Save Password</button>
    </section>

    <section id="manager">
      <h2>Saved Passwords</h2>
      <button id="exportBtn">⬇️ Export Vault</button>
      <button id="importBtn">⬆️ Import Vault</button>
      <input type="file" id="importFile" accept=".json" style="display:none" />
      <ul id="passwordList"></ul>
    </section>
  </div>

  <script src="crypto.js"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
