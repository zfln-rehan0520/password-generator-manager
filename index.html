<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault | Secure Local Manager</title>
    <style>
        :root { 
            --bg: #0d1117; 
            --paper: #161b22; 
            --accent: #00ff41; 
            --text: #c9d1d9; 
            --border: #30363d;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container { 
            width: 100%; 
            max-width: 420px; 
            background: var(--paper); 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
        }

        h1 { 
            text-align: center;
            border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; 
            font-size: 1.2rem; 
            letter-spacing: 1px; 
            margin-top: 0;
            color: #fff;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 5px;
            margin-left: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        input, button { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            background: #0d1117; 
            color: white; 
            box-sizing: border-box; 
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(0, 255, 65, 0.2);
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            background: #0d1117; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 15px 0; 
            border: 1px solid var(--border);
        }

        .option-item {
            display: flex;
            align-items: center; 
            gap: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .option-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            accent-color: var(--accent);
        }

        button { 
            background: var(--accent); 
            color: black; 
            font-weight: 800; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { 
            background: #39ff14; 
            transform: translateY(-2px); 
        }

        .vault-card { 
            background: #21262d; 
            padding: 15px; 
            border-radius: 8px; 
            margin-top: 15px; 
            border: 1px solid var(--border);
            position: relative; 
        }

        .delete-btn { 
            position: absolute; 
            top: 12px; 
            right: 12px; 
            color: #ff4444; 
            cursor: pointer; 
            background: none; 
            border: none;
            font-size: 0.8rem;
        }

        /* NEW: Import Zone Styling */
        .import-zone {
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 0.75rem;
            color: #8b949e;
            cursor: pointer;
            transition: 0.2s;
        }
        .import-zone:hover {
            border-color: var(--accent);
            color: #fff;
        }

        .hidden { display: none; }
        .entry-label { font-weight: bold; color: #fff; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container" id="app"></div>

<script>
/** 1. ENCRYPTION ENGINE **/
const CryptoEngine = {
    ITERATIONS: 310000,
    async deriveKey(password, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt, iterations: this.ITERATIONS, hash: 'SHA-256' },
            keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
        );
    },
    async encrypt(text, master) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await this.deriveKey(master, salt);
        const encoded = new TextEncoder().encode(text);
        const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
        return {
            ct: btoa(String.fromCharCode(...new Uint8Array(ct))),
            iv: btoa(String.fromCharCode(...iv)),
            salt: btoa(String.fromCharCode(...salt))
        };
    },
    async decrypt(data, master) {
        try {
            const salt = new Uint8Array(atob(data.salt).split('').map(c => c.charCodeAt(0)));
            const iv = new Uint8Array(atob(data.iv).split('').map(c => c.charCodeAt(0)));
            const ct = new Uint8Array(atob(data.ct).split('').map(c => c.charCodeAt(0)));
            const key = await this.deriveKey(master, salt);
            const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
            return new TextDecoder().decode(dec);
        } catch (e) { return "INVALID MASTER KEY"; }
    },
    generateRaw(len, opt) {
        let p = '';
        if(opt.u) p += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if(opt.l) p += 'abcdefghijklmnopqrstuvwxyz';
        if(opt.n) p += '0123456789';
        if(opt.s) p += '!@#$%^&*()_+';
        const arr = new Uint32Array(len);
        crypto.getRandomValues(arr);
        return Array.from(arr).map(x => p[x % p.length]).join('');
    }
};

/** 2. LOCAL STORAGE **/
const VaultStorage = {
    KEY: 'vlt_local_storage',
    get() { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); },
    save(data) { localStorage.setItem(this.KEY, JSON.stringify(data)); },
    add(entry) { const d = this.get(); d.push(entry); this.save(d); },
    delete(id) { const d = this.get().filter(i => i.id != id); this.save(d); }
};

/** 3. INTERFACE LOGIC **/
const UI = {
    render() {
        document.getElementById('app').innerHTML = `
            <h1>🔐 Password Generator & Manager (v1.02)</h1>
            <p> made by MOHAMMED REHAN , github id:- zfln-rehan0520</p>
            
            <label>Master Security Key</label>
            <input type="password" id="m-pass" placeholder="••••••••">
            
            <div class="options-grid">
                <label class="option-item"><input type="checkbox" id="c-u" checked> Uppercase</label>
                <label class="option-item"><input type="checkbox" id="c-l" checked> Lowercase</label>
                <label class="option-item"><input type="checkbox" id="c-n" checked> Numbers</label>
                <label class="option-item"><input type="checkbox" id="c-s" checked> Symbols</label>
            </div>
            
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                <span style="font-size:0.8rem; opacity:0.6;">Length:</span>
                <input type="number" id="p-len" value="16" min="6" max="64" style="margin:0; width: 80px;">
            </div>

            <label>Service Name</label>
            <input type="text" id="l-in" placeholder="e.g. GitHub">
            
            <button onclick="UI.handleSave()">Generate & Save</button>
            
            <div id="v-list"></div>
            
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button onclick="UI.export()" style="background:transparent; border:1px solid var(--border); color:#8b949e; font-size:0.7rem;">
                    Backup (.json)
                </button>
                <button onclick="document.getElementById('file-input').click()" style="background:transparent; border:1px solid var(--border); color:#8b949e; font-size:0.7rem;">
                    Restore (.json)
                </button>
            </div>
            <input type="file" id="file-input" class="hidden" accept=".json" onchange="UI.handleImport(event)">
            
            <p style="font-size: 0.6rem; text-align: center; opacity: 0.4; margin-top: 20px;">
                Note: Losing your Master Key means losing access to your data forever.
            </p>
        `;
        this.refresh();
    },

    async handleSave() {
        const m = document.getElementById('m-pass').value;
        const l = document.getElementById('l-in').value;
        const len = parseInt(document.getElementById('p-len').value);
        const opt = { u: document.getElementById('c-u').checked, l: document.getElementById('c-l').checked, n: document.getElementById('c-n').checked, s: document.getElementById('c-s').checked };
        
        if(!m || !l) return alert("Fill Master Password and Service Name!");
        const raw = CryptoEngine.generateRaw(len, opt);
        const enc = await CryptoEngine.encrypt(raw, m);
        VaultStorage.add({ label: l.toUpperCase(), ...enc, id: Date.now() });
        document.getElementById('l-in').value = '';
        this.refresh();
    },

    async handleImport(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (Array.isArray(data) && data.length > 0 && data[0].ct) {
                    if (confirm(`Import ${data.length} entries? This will replace your current local vault.`)) {
                        VaultStorage.save(data);
                        this.refresh();
                        alert("Vault Restored! Use your Master Key to reveal entries.");
                    }
                } else {
                    alert("Invalid backup file format.");
                }
            } catch (err) {
                alert("Error reading file.");
            }
        };
        reader.readAsText(file);
    },

    refresh() {
        const list = document.getElementById('v-list');
        const data = VaultStorage.get();
        list.innerHTML = '<h3 style="font-size:0.7rem; margin-top:25px; opacity:0.5; text-align:center;">VAULT ENTRIES</h3>';
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'vault-card';
            div.innerHTML = `
                <span class="entry-label">${item.label}</span>
                <button class="delete-btn" onclick="UI.del('${item.id}')">✕</button>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button onclick="UI.reveal('${item.id}')" style="width:auto; padding:6px 12px; margin:0; font-size:0.7rem;">Reveal</button>
                    <span id="p-${item.id}" style="color:var(--accent); font-weight:bold; font-family:monospace;"></span>
                </div>
            `;
            list.appendChild(div);
        });
    },

    async reveal(id) {
        const m = document.getElementById('m-pass').value;
        if(!m) return alert("Enter Master Key!");
        const entry = VaultStorage.get().find(e => e.id == id);
        const pass = await CryptoEngine.decrypt(entry, m);
        const span = document.getElementById(`p-${id}`);
        span.innerText = pass;
        setTimeout(() => { span.innerText = ''; }, 5000);
    },

    del(id) {
        if(confirm("Delete this entry permanently?")) {
            VaultStorage.delete(id);
            this.refresh();
        }
    },

    export() {
        const data = localStorage.getItem(VaultStorage.KEY);
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `vault_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }
};

document.addEventListener('DOMContentLoaded', () => UI.render());
</script>
</body>
</html>
